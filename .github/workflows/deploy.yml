name: Build and Push Images

on:
  push:
    branches: [ "**" ]
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: vars
        run: |
          # Get the 7-character SHA
          SHA_SHORT=$(git rev-parse --short HEAD)
          
          # Check if the current branch is main
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=prod-${SHA_SHORT}" >> $GITHUB_OUTPUT
          else
            echo "tag=$dev-{SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Assistant Dockerfile
        run: |
          pip install langgraph-cli
          cd assistant && langgraph dockerfile ./Dockerfile

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/packpal-backend:${{ steps.vars.outputs.tag }}

      - name: Build and Push Assistant
        uses: docker/build-push-action@v5
        with:
          context: ./assistant
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/packpal-assistant:${{ steps.vars.outputs.tag }}
