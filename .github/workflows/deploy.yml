name: Build and Push Images

on:
  push:
    branches: [ "**" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Generate Assistant Dockerfile
        run: |
          pip install langgraph-cli
          cd assistant && langgraph dockerfile ./Dockerfile

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/packpal-backend:${{ steps.vars.outputs.sha_short }}

      - name: Build and Push Assistant
        uses: docker/build-push-action@v5
        with:
          context: ./assistant
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/packpal-assistant:${{ steps.vars.outputs.sha_short }}